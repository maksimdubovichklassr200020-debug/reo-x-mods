<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REO-X-MODS | Ultimate Safe Platform</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --main: #00f2ff; --danger: #ff0055; --bg: #030308; --card: rgba(255, 255, 255, 0.03); }
        
        body { 
            background: var(--bg); color: #fff; font-family: 'Exo 2', sans-serif; margin: 0;
            background-image: radial-gradient(circle at 50% 0%, #101525 0%, transparent 50%);
            min-height: 100vh; overflow-x: hidden;
        }

        header { 
            backdrop-filter: blur(20px); background: rgba(0,0,0,0.8);
            padding: 15px 5%; border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000;
        }

        .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.5rem; color: var(--main); text-shadow: 0 0 15px var(--main); }
        .user-panel { font-size: 0.8rem; border-left: 2px solid var(--main); padding-left: 15px; }

        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

        .glass { 
            background: var(--card); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 25px; 
            margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* Поля для новичков */
        .upload-zone { border: 2px dashed rgba(0, 242, 255, 0.3); border-radius: 15px; padding: 20px; text-align: center; transition: 0.3s; cursor: pointer; }
        .upload-zone:hover { background: rgba(0, 242, 255, 0.05); border-color: var(--main); }

        input, select, textarea { 
            width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.3); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; box-sizing: border-box;
        }
        input:focus { border-color: var(--main); outline: none; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }

        .btn { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-family: 'Orbitron', sans-serif; font-weight: 900; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.4s;
        }
        .btn-main { background: linear-gradient(90deg, #00f2ff, #0072ff); color: #000; }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 0 20px var(--main); }

        /* Сетка модов */
        .mod-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .mod-card { position: relative; overflow: hidden; }
        .cat-tag { position: absolute; top: 15px; right: 15px; font-size: 10px; color: var(--main); font-weight: 900; }
        
        .type-badge { background: var(--main); color: #000; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-right: 5px; }

        .scanner { height: 4px; background: #000; border-radius: 10px; margin: 15px 0; display: none; overflow: hidden; }
        .bar { height: 100%; width: 0%; background: var(--main); transition: 0.1s; box-shadow: 0 0 10px var(--main); }

        .comment-section { margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 10px; max-height: 200px; overflow-y: auto; }
        .hidden { display: none; }
    </style>
</head>
<body>

<header>
    <div class="logo">REO-X</div>
    <div id="user-info" class="user-panel">SYSTEM OFFLINE</div>
</header>

<div class="container">
    <!-- ЛОГИН -->
    <div id="auth-box" class="glass">
        <h2 style="font-family: Orbitron; text-align: center;">ACCESS PROTOCOL</h2>
        <input type="email" id="aEmail" placeholder="GMAIL ADDRESS">
        <input type="password" id="aPass" placeholder="SECURE PASSWORD">
        <button class="btn btn-main" onclick="handleAuth()">INITIALIZE ACCESS</button>
    </div>

    <!-- ЗАГРУЗКА -->
    <div id="upload-box" class="glass hidden">
        <h2 style="font-family: Orbitron;">UPLOAD DATA STREAM</h2>
        <input type="text" id="mTitle" placeholder="MOD NAME (E.G. CHICKEN GUN MOD)">
        <select id="mCat"></select>
        <textarea id="mDesc" placeholder="MOD DESCRIPTION..."></textarea>
        
        <div class="upload-zone" onclick="document.getElementById('mFile').click()">
            <span id="file-name">CLICK TO ATTACH APK / XAPK / APKS / ZIP</span>
            <input type="file" id="mFile" hidden onchange="updateFileName(this)">
        </div>

        <div class="scanner" id="scan-ui"><div class="bar" id="bar"></div></div>
        <div id="scan-log" style="font-size: 11px; text-align: center; color: var(--main); margin-top: 10px;"></div>

        <button class="btn btn-main" style="margin-top: 15px;" onclick="startSecureUpload()">DEPLOY TO REPOSITORY</button>
    </div>

    <div class="mod-grid" id="mod-container"></div>
</div>

<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>
<script src="https://gstatic.com"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAaYQAyMPiOeP5iMI7tcL07rD_eFjuIbJw",
        authDomain: "://firebaseapp.com",
        projectId: "reo-x-mods",
        storageBucket: "reo-x-mods.firebasestorage.app",
        messagingSenderId: "576322555510",
        appId: "1:576322555510:web:78d21257a4f9a553429957"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const games = ["Chicken Gun", "Minecraft PE", "GTA:SA", "Standoff 2", "Roblox", "PUBG", "Brawl Stars", "Terraria", "Pixel Gun 3D", "Geometry Dash", "Among Us", "Free Fire", "Call of Duty", "Mobile Legends", "Clash of Clans", "Genshin Impact", "Subway Surfers", "Shadow Fight 2", "Critical Ops", "World of Tanks", "FNAF", "Sonic Force", "Angry Birds", "Plants vs Zombies", "Toca Boca", "Sims Mobile", "CarX Drift", "Need for Speed", "Asphalt 9", "FIFA Mobile", "Dead by Daylight", "Mortal Kombat", "Modern Ops", "Stickman Warriors", "Granny", "Evil Nun", "Slendrina", "Cyberika", "Last Day on Earth", "LifeAfter", "Pokemon GO", "Harry Potter", "Clash Royale", "Brawlhalla", "Badland", "Limbo", "Vector", "Temple Run", "Fruit Ninja", "Cut the Rope", "Hill Climb Racing", "Dr. Drive", "My Talking Tom", "MSM", "Hay Day", "State of Survival", "Top War", "League of Legends", "TFT", "Dota Underlords", "Gwent", "Hearthstone", "Shadowverse", "Raid: Shadow Legends", "Diablo Immortal", "Sky: Children", "Honkai: Star Rail", "Evertale", "Gacha Club", "Among Lock", "S.T.A.L.K.E.R.", "Half-Life Mobile", "CS 1.6 Android", "Emulators", "Software", "Scripts", "Graphics", "Other Game"];
    
    const sel = document.getElementById('mCat');
    games.sort().forEach(g => { sel.innerHTML += `<option value="${g}">${g.toUpperCase()}</option>`; });

    function xEnc(t) { return btoa(unescape(encodeURIComponent(t + "_REOX"))); }
    function xDec(t) { try { return decodeURIComponent(escape(atob(t))).replace("_REOX", ""); } catch(e) { return "Data Stream"; } }

    function updateFileName(input) {
        document.getElementById('file-name').innerText = input.files[0].name;
    }

    async function handleAuth() {
        const e = document.getElementById('aEmail').value;
        const p = document.getElementById('aPass').value;
        if(!e.includes('@gmail.com')) return alert("ONLY @GMAIL.COM ALLOWED");
        try {
            await auth.signInWithEmailAndPassword(e,p);
        } catch(err) {
            await auth.createUserWithEmailAndPassword(e,p);
            await db.collection("users").doc(auth.currentUser.uid).set({rep: 10, nick: e.split('@')[0]});
        }
        location.reload();
    }

    async function startSecureUpload() {
        const f = document.getElementById('mFile').files[0];
        const t = document.getElementById('mTitle').value;
        const d = document.getElementById('mDesc').value;
        const log = document.getElementById('scan-log');
        const bar = document.getElementById('bar');

        if(!f || !t) return alert("SELECT FILE AND TITLE");

        // X-GUARD: ANTI-18+ & FORBIDDEN
        const forbidden = ["18+", "porn", "секс", "слив", "nude", "хентай", "hentai", "чит на деньги"];
        if(forbidden.some(w => (t + d).toLowerCase().includes(w))) {
            log.innerText = "❌ FORBIDDEN CONTENT DETECTED. REP PENALTY: -50";
            log.style.color = "var(--danger)";
            await db.collection("users").doc(auth.currentUser.uid).update({rep: firebase.firestore.FieldValue.increment(-50)});
            return;
        }

        document.getElementById('scan-ui').style.display = "block";
        for(let i=0; i<=100; i+=4) {
            bar.style.width = i + "%";
            log.innerText = i < 40 ? "🔍 X-RAY VIRUS SCAN..." : i < 80 ? "🛡️ CRYPTING DATA..." : "🚀 FINALIZING...";
            await new Promise(r => setTimeout(r, 60));
        }

        await db.collection("mods").add({
            t: xEnc(t),
            c: document.getElementById('mCat').value,
            d: d,
            u: auth.currentUser.uid,
            f: f.name,
            ext: f.name.split('.').pop().toUpperCase(),
            time: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection("users").doc(auth.currentUser.uid).update({rep: firebase.firestore.FieldValue.increment(15)});
        log.innerText = "✅ DEPLOY SUCCESSFUL!";
        setTimeout(() => location.reload(), 1500);
    }

    db.collection("mods").orderBy("time", "desc").onSnapshot(snap => {
        const cont = document.getElementById('mod-container');
        cont.innerHTML = "";
        snap.forEach(doc => {
            const data = doc.data();
            const id = doc.id;
            cont.innerHTML += `
                <div class="glass mod-card">
                    <span class="cat-tag">${data.c}</span>
                    <span class="type-badge">${data.ext}</span>
                    <h3 style="color:var(--main); margin:10px 0 5px 0">${xDec(data.t)}</h3>
                    <p style="font-size:0.8rem; opacity:0.6; margin-bottom:15px">${data.d}</p>
                    <button class="btn" style="background:#111; color:#fff; font-size:10px; border:1px solid #333" onclick="alert('Starting Secure Download...')">DOWNLOAD DATA</button>
                    <div class="comment-section" id="cs-${id}"></div>
                    <div style="display:flex; gap:5px; margin-top:10px">
                        <input type="text" id="ci-${id}" placeholder="REPLY..." style="margin:0; font-size:10px; padding:8px">
                        <button class="btn btn-main" style="width:60px; padding:0; font-size:9px" onclick="addComment('${id}')">SEND</button>
                    </div>
                </div>`;
            loadComments(id);
        });
    });

    async function addComment(id) {
        if(!auth.currentUser) return alert("AUTH REQUIRED");
        const inp = document.getElementById(`ci-${id}`);
        if(!inp.value) return;
        const u = await db.collection("users").doc(auth.currentUser.uid).get();
        await db.collection("mods").doc(id).collection("comments").add({
            t: inp.value,
            n: u.data().nick,
            time: firebase.firestore.FieldValue.serverTimestamp()
        });
        inp.value = "";
    }

    function loadComments(id) {
        db.collection("mods").doc(id).collection("comments").orderBy("time", "asc").onSnapshot(s => {
            const div = document.getElementById(`cs-${id}`);
            if(!div) return;
            div.innerHTML = "";
            s.forEach(c => {
                div.innerHTML += `<div style="font-size:0.7rem; margin-bottom:4px"><b>${c.data().n}:</b> ${c.data().t}</div>`;
            });
        });
    }

    auth.onAuthStateChanged(async user => {
        if(user) {
            document.getElementById('auth-box').classList.add('hidden');
            document.getElementById('upload-box').classList.remove('hidden');
            const u = await db.collection("users").doc(user.uid).get();
            document.getElementById('user-info').innerHTML = `AGENT: ${u.data().nick.toUpperCase()} | REP: <span style="color:#ffca2c">${u.data().rep}</span>`;
        }
    });
</script>
</body>
</html>
